apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: pichta
type: Opaque
stringData:
  POSTGRES_USER: "{{ POSTGRES_USER }}"
  POSTGRES_PASSWORD: "{{ POSTGRES_PASSWORD }}"
  POSTGRES_DB: "{{ POSTGRES_DB }}"
  SECRET_KEY_JWT: "{{ SECRET_KEY_JWT }}"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
