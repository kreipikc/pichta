stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: "docker.io"
  DOCKER_NAMESPACE: "pan-tech"
  BACKEND_IMAGE: "$DOCKER_REGISTRY/$DOCKER_NAMESPACE/pichta-backend"
  FRONTEND_IMAGE: "$DOCKER_REGISTRY/$DOCKER_NAMESPACE/pichta-frontend"

build-backend:
  stage: build
  script:
    - export IMAGE_TAG="$(date +%Y%m%d)-$CI_COMMIT_SHORT_SHA"
    - echo "Building backend image $BACKEND_IMAGE:$IMAGE_TAG"
    - echo "DOCKER_REGISTRY=$DOCKER_REGISTRY"
    - |
      if [ -n "$DOCKER_USER" ]; then
        echo "DOCKER_USER=$DOCKER_USER"
      else
        echo "DOCKER_USER is empty"
        exit 1
      fi
    - |
      if [ -n "$DOCKER_PASSWORD" ]; then
        echo "DOCKER_PASSWORD=$DOCKER_PASSWORD"
      else
        echo "DOCKER_PASSWORD is empty"
        exit 1
      fi
    - docker login -u "$DOCKER_USER" -p "$DOCKER_PASSWORD"
    - docker build -t "$BACKEND_IMAGE:$IMAGE_TAG" -f /opt/k8s/pichta/docker/backend/Dockerfile backend/
    - docker push "$BACKEND_IMAGE:$IMAGE_TAG"
    - docker tag "$BACKEND_IMAGE:$IMAGE_TAG" "$BACKEND_IMAGE:latest"
    - docker push "$BACKEND_IMAGE:latest"
    - echo "$IMAGE_TAG" > backend_tag.txt
  artifacts:
    paths:
      - backend_tag.txt
    expire_in: 1 hour
  rules:
    - changes:
        - backend/**/*
    - when: never
  tags:
    - shell

build-frontend:
  stage: build
  script:
    - export IMAGE_TAG="$(date +%Y%m%d)-$CI_COMMIT_SHORT_SHA"
    - echo "Building frontend image $FRONTEND_IMAGE:$IMAGE_TAG"
    - echo "DOCKER_REGISTRY=$DOCKER_REGISTRY"
    - |
      if [ -n "$DOCKER_USER" ]; then
        echo "DOCKER_USER=$DOCKER_USER"
      else
        echo "DOCKER_USER is empty"
        exit 1
      fi
    - |
      if [ -n "$DOCKER_PASSWORD" ]; then
        echo "DOCKER_PASSWORD is set"
        echo "DOCKER_PASSWORD length: ${#DOCKER_PASSWORD}"
      else
        echo "DOCKER_PASSWORD is empty"
        exit 1
      fi
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin "$DOCKER_REGISTRY"
    - docker build -t "$FRONTEND_IMAGE:$IMAGE_TAG" -f docker/frontend/Dockerfile frontend/
    - docker push "$FRONTEND_IMAGE:$IMAGE_TAG"
    - docker tag "$FRONTEND_IMAGE:$IMAGE_TAG" "$FRONTEND_IMAGE:latest"
    - docker push "$FRONTEND_IMAGE:latest"
    - echo "$IMAGE_TAG" > frontend_tag.txt
  artifacts:
    paths:
      - frontend_tag.txt
    expire_in: 1 hour
  rules:
    - changes:
        - frontend/**/*
    - when: never
  tags:
    - shell

deploy:
  stage: deploy
  script:
    - BACKEND_TAG=$(cat backend_tag.txt 2>/dev/null || echo "latest")
    - FRONTEND_TAG=$(cat frontend_tag.txt 2>/dev/null || echo "latest")
    - echo "Deploying backend:$BACKEND_TAG frontend:$FRONTEND_TAG"
    - cd /etc/ansible
    - ansible-playbook /opt/k8s/pichta/ansible/deploy.yml -t pref --extra-vars "backend_image_tag=$BACKEND_TAG frontend_image_tag=$FRONTEND_TAG"
  rules:
    - when: always
  needs:
    - job: build-backend
      optional: true
      artifacts: true
    - job: build-frontend
      optional: true
      artifacts: true
  tags:
    - shell
